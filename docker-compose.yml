services:
  db:
    image: mysql:8.0
    restart: unless-stopped
    command: --default-authentication-plugin=mysql_native_password
    environment:
      MYSQL_DATABASE: iran_war_db
      MYSQL_USER: iran_user9
      MYSQL_PASSWORD: iran_pass
      MYSQL_ROOT_PASSWORD: rootpass
    ports:
      - "3308:3306"
    volumes:
      - db_data:/var/lib/mysql
      - ./docker/mysql/base.sql:/docker-entrypoint-initdb.d/base.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uroot", "-prootpass"]
      interval: 5s
      timeout: 5s
      retries: 20

  web:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "8081:80"
    environment:
      DB_HOST: db
      DB_PORT: 3306
      DB_NAME: iran_war_db
      DB_USER: iran_user
      DB_PASSWORD: iran_pass
      APP_ENV: dev
    depends_on:
      db:
        condition: service_healthy

volumes:
  db_data:
